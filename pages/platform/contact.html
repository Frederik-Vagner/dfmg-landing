<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DFMG Platform — Contact Sales</title>
    <meta name="description" content="Get in touch with our sales team for pricing, demos, or partnership inquiries.">

    <meta property="og:title" content="DFMG Platform — Contact Sales">
    <meta property="og:description" content="Get in touch with our sales team for pricing, demos, or partnership inquiries.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://dfmg.dk/pages/platform/contact.html">
    <meta property="og:image" content="https://dfmg.dk/images/platform/og-image.jpg">
    <meta property="og:locale" content="en_GB">
    <link rel="canonical" href="https://dfmg.dk/pages/platform/contact.html">

    <link rel="icon" href="/images/logos/logo.png" type="image/png">
    <link rel="icon" href="/images/logos/favicon-32x32.png" sizes="32x32" type="image/png">
    <link rel="apple-touch-icon" href="/images/logos/apple-touch-icon.png" sizes="180x180">
    <meta name="theme-color" content="#344767">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/styles.css">
    <script src="/js/nav-enhancer.js"></script>
    <script src="/js/template-loader.js"></script>
</head>
<body>
    <div id="header"></div>

    <!-- Hero -->
    <section class="platform-hero" style="padding-bottom: 3rem;">
        <div class="container">
            <div class="subtitle" style="color: rgba(255,255,255,0.6);">CONTACT</div>
            <h1 class="title">Get in touch</h1>
            <p class="body">Questions about pricing, partnerships, or the platform? We'd love to hear from you.</p>
        </div>
    </section>

    <!-- Contact form + info -->
    <section class="section">
        <div class="container">
            <div class="demo-split">
                <div class="demo-split__form">
                    <h2 class="title text-charcoal" style="font-size: 1.6rem;">Send us a message</h2>

                    <form class="platform-form" action="/pages/platform/tak.html" method="GET">
                        <div class="form-row-2">
                            <div class="form-group">
                                <label for="contact-name">Full name</label>
                                <input type="text" id="contact-name" name="name" placeholder="Your name" required>
                            </div>
                            <div class="form-group">
                                <label for="contact-company">Company</label>
                                <input type="text" id="contact-company" name="company" placeholder="Company name">
                            </div>
                        </div>
                        <div class="form-row-2">
                            <div class="form-group">
                                <label for="contact-email">Email</label>
                                <input type="email" id="contact-email" name="email" placeholder="you@example.dk" required>
                            </div>
                            <div class="form-group">
                                <label for="contact-phone">Phone</label>
                                <input type="tel" id="contact-phone" name="phone" placeholder="+45 12 34 56 78">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="contact-interest">I'm interested in</label>
                            <select id="contact-interest" name="interest">
                                <option value="">Select...</option>
                                <option value="demo">Booking a demo</option>
                                <option value="pricing">Pricing information</option>
                                <option value="partnership">Partnership</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="contact-message">Message</label>
                            <textarea id="contact-message" name="message" placeholder="Tell us about your needs..."></textarea>
                        </div>
                        <button type="submit" class="btn btn--success btn--md" style="width: 100%;">
                            <i class="fas fa-paper-plane mr-05"></i> Send Message
                        </button>
                    </form>
                </div>
                <div class="demo-split__visual">
                    <div class="card p-2 bg-gradient-white mb-2">
                        <h4><i class="fas fa-envelope"></i> Email</h4>
                        <p><a href="mailto:platform@dfmg.dk" style="color: var(--primary);">platform@dfmg.dk</a></p>
                    </div>
                    <div class="card p-2 bg-gradient-white mb-2">
                        <h4><i class="fas fa-phone"></i> Phone</h4>
                        <p><a href="tel:+4550480273" style="color: var(--primary);">+45 50 48 02 73</a></p>
                    </div>
                    <div class="card p-2 bg-gradient-white mb-2">
                        <h4><i class="fas fa-clock"></i> Office hours</h4>
                        <p>Monday - Friday, 08:00 - 17:00 CET</p>
                    </div>
                    <div class="card p-2 bg-gradient-white">
                        <h4><i class="fas fa-building"></i> Company</h4>
                        <p>DFMG ApS<br>CVR: 44646102<br>Denmark</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div id="contact-widget"></div>

    <div id="footer"></div>
    <script src="/js/components.js" defer></script>
</body>
</html>
