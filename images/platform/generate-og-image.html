<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        /* Open this file in a browser, screenshot at exactly 1200x630 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1200px;
            height: 630px;
            font-family: 'Montserrat', -apple-system, sans-serif;
            background: linear-gradient(135deg, #344767 0%, #4285f4 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .content {
            text-align: center;
            padding: 60px;
        }
        .logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 24px;
        }
        .logo img {
            width: 100%;
            height: 100%;
        }
        h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }
        p {
            font-size: 22px;
            font-weight: 300;
            opacity: 0.85;
            max-width: 700px;
            margin: 0 auto 32px;
            line-height: 1.5;
        }
        .tags {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .tag {
            background: rgba(255,255,255,0.15);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 500;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="content">
        <div class="logo">
            <img src="../logos/logo.png" alt="">
        </div>
        <h1>DFMG Platform</h1>
        <p>All-in-one management for Danish service companies</p>
        <div class="tags">
            <span class="tag">Scheduling</span>
            <span class="tag">Invoicing</span>
            <span class="tag">Payroll</span>
            <span class="tag">CRM</span>
            <span class="tag">Accounting</span>
            <span class="tag">40+ Modules</span>
        </div>
    </div>
</body>
</html>
